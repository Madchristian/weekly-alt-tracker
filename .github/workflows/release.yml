name: Release

# Nur Tags v* erzeugen ein Release. Normale Pushes auf main loesen nichts aus.
# workflow_dispatch dient ausschliesslich dem Trockenlauf (Packager mit -d, kein Upload).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Vollstaendige Historie und Tags, sonst kann der Packager
          # weder Version noch Changelog aus dem Tag ableiten.
          fetch-depth: 0

      - name: Package and release
        uses: BigWigsMods/packager@v2
        with:
          # Manueller Lauf: nur packen, nichts hochladen.
          args: ${{ github.event_name == 'workflow_dispatch' && '-d' || '' }}
        env:
          # Vom Runner automatisch bereitgestellt, kein eigenes Secret noetig.
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          # Aktiver Wago-Releasekanal. Der Tokenwert liegt ausschliesslich im
          # gleichnamigen GitHub-Actions-Secret und niemals im Repository.
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
